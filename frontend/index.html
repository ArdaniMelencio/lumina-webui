<!DOCTYPE html>
<html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>LLM Web UI</title>
      <link rel="stylesheet" href="src/css/variables.css">
      <link rel="stylesheet" href="styling.css">
  </head>
  
  <body>
    <header id="app-header">
        <button class="header-button" id="header-sidepanel-button">
            <img class="icon sidebar">
        </button>
        <button class="header-button" id="header-exit-button" onclick="window.pywebview.api.close_app()">
            <img class="icon exit">
        </button>
        <button class="header-button" id="header-settings-button">
            <img class="icon settings">
        </button>
    </header>
    <main>
        <aside id="sidepanel">
            sidepanel
        </aside>
        <div id="chat-container">
            <div id="chatbox">
                Messages will be here
            </div>
            <form id="user-entry">
                <textarea id="form-input" type="text" placeholder="Type a message"></textarea>
                <button id="form-submit"  type="submit">Send</button>
            </form>
        </div>
    </main>
    <script src="src/js/constants.js"></script>
    <script src="src/js/events.js"></script>
  </body>
</html>
