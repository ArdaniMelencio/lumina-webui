<!DOCTYPE html>
<html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>LLM Web UI</title>
      <link rel="stylesheet" href="src/css/variables.css">
      <link rel="stylesheet" href="src/css/styling.css">
  </head>
  
  <body>
    <header id="app-header">
        <button class="header-button" id="header-sidepanel-button">
            <span class="icon sidebar"></span>
        </button>
        <button class="header-button" id="header-exit-button" onclick="startClose()">
            <img class="icon exit">
        </button>
        <button class="header-button" id="header-settings-button">
            <img class="icon settings">
        </button>
    </header>
    <main>
        <aside id="sidepanel">
        </aside>
        <div id="chat-container">
            <div id="chatbox">
                Messages will be here
            </div>
            <form id="user-entry">
                <textarea id="form-input" type="text" placeholder="Type a message... (/ to focus)"></textarea>
                <button id="form-submit"  type="submit">
                    <span class="icon submit"></span>
                </button>
            </form>
        </div>
        <div id="settings">
            <div id="dim">
                <div id="settings-panel">
                    <div id="settings-sidepanel">
                        <button class="settings-btn" data-panel="General" >General</button>
                        <button class="settings-btn" data-panel="Themes" >Themes</button>
                        <button class="settings-btn" data-panel="Advanced">Advanced</button>
                    </div>
                    <div id="settings-display">
                        <div id="General-panel" class="display">
                            <h2>General Settings</h2>
                            <form class="settings-selection">
                                <div class="settings-label">Model Name:</div>
                                <input class="settings-input" id="model-name-input" data-settings="model"></input>
                            </form>
                            <form class="settings-selection">
                                <div class="settings-label">Use Local</div>
                                <label class="settings-input switch" >
                                    <input id="checkbox-local" type="checkbox" data-settings="use_local">
                                    <span class="slider"></span>
                                </label>
                            </form>
                            <form class="settings-selection">
                                <div class="settings-label">API code:</div>
                                <input class="settings-input" id="api-key-input" data-settings="api_key"></input>
                            </form>
                        </div>
                    
                        <div id="Themes-panel" class="display">
                            <h2>Themes Settings</h2>
                            <form class="settings-selection">
                                <div class="settings-label">Primary Color:</div>
                                <input id="primary-color-picker" type="color" data-settings="primaryColor"> 
                            </form>
                        </div>
                    
                        <div id="Advanced-panel" class="display">
                            <h2>Advanced Settings</h2>
                            <form class="settings-selection">
                                <div class="settings-label">System Message:</div>
                                <textarea id="system-message" data-settings="system-message" placeholder="Enter your system message here"></textarea>
                            </form>
                        </div>
                    </div>
                </div>
                <div id="settings-save-panel">
                    <button id="save-changes" onclick="saveSettings()">save</button>
                    <button id="reset-changes" onclick="Settings.reset()">reset</button>
                </div>
            </div>
        </div>
    </main>
    <script src="src/js/constants.js"></script>
    <script src="src/js/util.js"></script>
    <script src="src/js/events.js"></script>
    <script src="src/js/main.js"></script>
  </body>
</html>
